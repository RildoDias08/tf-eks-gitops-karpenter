name: Continuous Deployment
on:
  workflow_dispatch:
  push:
    branches:
    - main
    paths:
        - "app/**"
env:
    BACKEND_REPOSITORY: app/backend
    FRONTEND_REPOSITORY: app/frontend
    IMAGE_TAG: ${{ github.sha }}

permissions:
  id-token: write
  contents: read 
  
jobs:
  backend:
    name: Deploy backend
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS Credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v6.0.0
      with:
        aws-region: us-east-1
        role-to-assume: arn:aws:iam::749856334984:role/role-pipeline-TEGK

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push docker image to Amazon ECR
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker build -f ./app/backend/YoutubeLiveApp/Dockerfile \
            -t $REGISTRY/$BACKEND_REPOSITORY:$IMAGE_TAG \
            ./app/backend/YoutubeLiveApp
        docker push $REGISTRY/$BACKEND_REPOSITORY:$IMAGE_TAG

    - uses: actions/checkout@v6
      with:
        repository: 'RildoDias08/GitOps'
        token: ${{ secrets.PAT }}

    - name: Kustomize Edit
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        kustomize edit set image $REGISTRY/$BACKEND_REPOSITORY=$REGISTRY/$BACKEND_REPOSITORY:$IMAGE_TAG
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add ./kustomization.yaml
        git commit -m "[BOT] Changing image to $REGISTRY/$BACKEND_REPOSITORY:$IMAGE_TAG"
        git push

  frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v6.0.0
      with:
        aws-region: us-east-1
        role-to-assume: arn:aws:iam::749856334984:role/role-pipeline-TEGK

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push docker image to Amazon ECR
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker build -f ./app/frontend/youtube-live-app/Dockerfile \
            -t $REGISTRY/$FRONTEND_REPOSITORY:$IMAGE_TAG \
            ./app/frontend/youtube-live-app
        docker push $REGISTRY/$FRONTEND_REPOSITORY:$IMAGE_TAG

    - uses: actions/checkout@v6
      with:
        repository: 'RildoDias08/GitOps'
        token: ${{ secrets.PAT }}

    - name: Kustomize Edit
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        kustomize edit set image $REGISTRY/$FRONTEND_REPOSITORY=$REGISTRY/$FRONTEND_REPOSITORY:$IMAGE_TAG
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add ./kustomization.yaml
        git commit -m "[BOT] Changing image to $REGISTRY/$FRONTEND_REPOSITORY:$IMAGE_TAG"
        git push